$schema: "https://json-schema.org/draft/2020-12/schema"
title: "CadEval STEP Task Schema"
description: "Schema for STEP-based text-to-CAD benchmark task files"
type: object
required:
  - task_id
  - description
  - reference_step
  - requirements
properties:
  task_id:
    type: string
    pattern: "^[a-zA-Z0-9._-]+$"
    description: "Unique task identifier"

  version:
    type: string
    default: "1.0"

  description:
    type: string
    minLength: 10
    description: "Canonical model prompt"

  reference_step:
    type: string
    description: "Path to ground-truth STEP file, e.g. reference/part_001.step"

  reference_stl:
    type: string
    description: "Optional pre-tessellated STL reference"

  units:
    type: string
    enum: [mm, cm, m, in]
    default: mm

  manual_operations:
    type: [integer, "null"]
    minimum: 1
    description: "Estimated CAD operation count"

  difficulty:
    type: string
    enum: [easy, medium, hard]

  tags:
    type: array
    items:
      type: string

  requirements:
    type: object
    required:
      - bounding_box
    properties:
      bounding_box:
        type: array
        minItems: 3
        maxItems: 3
        items:
          type: number
          minimum: 0
        description: "Expected [x, y, z] dimensions in task units"

      topology_requirements:
        type: object
        properties:
          expected_component_count:
            type: integer
            minimum: 1
            default: 1
          must_be_watertight:
            type: boolean
            default: true
        additionalProperties: false

      metric_thresholds_override:
        type: object
        properties:
          chamfer_threshold_mm:
            type: number
            minimum: 0
          hausdorff_threshold_mm:
            type: number
            minimum: 0
          volume_threshold_percent:
            type: number
            minimum: 0
          bounding_box_tolerance_mm:
            type: number
            minimum: 0
        additionalProperties: false
    additionalProperties: false

  metadata:
    type: object
    properties:
      author:
        type: string
      source:
        type: string
      license:
        type: string
      created_at:
        type: string
        format: date-time
      notes:
        type: string
    additionalProperties: true

additionalProperties: false
