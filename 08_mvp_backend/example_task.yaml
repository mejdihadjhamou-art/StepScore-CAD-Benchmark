description: >
  Create a single connected L-bracket in mm. Right-handed XYZ. Origin at the outer bottom corner where legs meet.
  Leg A: 80x30x8 (XxYxZ), X=0..80, Y=0..30, Z=0..8.
  Leg B: 30x8x60, X=0..30, Y=0..8, Z=0..60.
